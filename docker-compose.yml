services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_CONTACT_EMAIL: "${NEXT_PUBLIC_CONTACT_EMAIL:-hello@paperstride.org}"
        NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-https://paperstride.duckdns.org}"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      # Self-hosted Ollama on the host (OpenAI-compatible). No API key needed.
      LLM_BASE_URL: "${LLM_BASE_URL:-http://host.docker.internal:11434/v1}"
      LLM_MODEL: "${LLM_MODEL:-qwen2.5:7b-instruct}"
      LLM_TIMEOUT_MS: "${LLM_TIMEOUT_MS:-180000}"
      NEXT_PUBLIC_CONTACT_EMAIL: "${NEXT_PUBLIC_CONTACT_EMAIL:-hello@paperstride.org}"
      NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-https://paperstride.duckdns.org}"
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    depends_on:
      - web
    restart: unless-stopped
    environment:
      SITE_DOMAIN: "${SITE_DOMAIN:-paperstride.duckdns.org}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
